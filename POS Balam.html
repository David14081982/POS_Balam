<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Balam Guayaberas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Playfair+Display:wght@400;600;700&family=Geist:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <!-- Tailwind (Heritage). preflight ON: reset propio, ya no hay CSS viejo -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            /* --- Superficies --- */
            'background': '#F8FAFC', 'on-background': '#191c1e',
            'surface': '#ffffff', 'surface-dim': '#d8dadc', 'surface-bright': '#ffffff',
            'surface-container-lowest': '#ffffff', 'surface-container-low': '#F1F5F9',
            'surface-container': '#eceef0', 'surface-container-high': '#e6e8ea',
            'surface-container-highest': '#e0e3e5', 'surface-variant': '#e0e3e5',
            'on-surface': '#191c1e', 'on-surface-variant': '#475569',
            'inverse-surface': '#2d3133', 'inverse-on-surface': '#eff1f3',
            'outline': '#CBD5E1', 'outline-variant': '#E2E8F0', 'surface-tint': '#565e74',
            /* --- Marca (navy) --- */
            'primary': '#131B2E', 'on-primary': '#ffffff',
            'primary-container': '#1E293B', 'on-primary-container': '#7c839b',
            'inverse-primary': '#bec6e0',
            /* --- Acento (gold, 4 roles) --- */
            'gold': '#D4AF38', 'gold-soft': '#FEF3C7', 'gold-text': '#92760F', 'on-gold': '#131B2E',
            'muted': '#94A3B8',
            /* --- Semánticos + soft --- */
            'success': '#047857', 'success-soft': '#ECFDF5',
            'warning': '#B45309', 'warning-soft': '#FFFBEB',
            'danger': '#B91C1C', 'danger-soft': '#FEF2F2',
            'info': '#1D4ED8', 'info-soft': '#EFF6FF',
            /* --- Heritage legacy (en migración → gold/semánticos) --- */
            'secondary': '#735c00', 'on-secondary': '#ffffff',
            'secondary-container': '#fed65b', 'on-secondary-container': '#745c00',
            'tertiary': '#000000', 'on-tertiary': '#ffffff',
            'tertiary-container': '#0b1c30', 'on-tertiary-container': '#75859d',
            'error': '#ba1a1a', 'on-error': '#ffffff',
            'error-container': '#ffdad6', 'on-error-container': '#93000a',
            'primary-fixed': '#dae2fd', 'primary-fixed-dim': '#bec6e0',
            'on-primary-fixed': '#131b2e', 'on-primary-fixed-variant': '#3f465c',
            'secondary-fixed': '#ffe088', 'secondary-fixed-dim': '#e9c349',
            'on-secondary-fixed': '#241a00', 'on-secondary-fixed-variant': '#574500',
            'tertiary-fixed': '#d3e4fe', 'tertiary-fixed-dim': '#b7c8e1',
            'on-tertiary-fixed': '#0b1c30', 'on-tertiary-fixed-variant': '#38485d',
          },
          borderRadius: { DEFAULT: '0.375rem', lg: '0.625rem', xl: '0.875rem', full: '9999px' },
          spacing: { 'margin-mobile': '16px', 'container-max': '1440px', 'margin-desktop': '48px', 'base': '8px', 'gutter': '24px' },
          boxShadow: {
            'e1': '0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06)',
            'e2': '0 4px 12px -2px rgba(15,23,42,0.08)',
            'e3': '0 16px 40px -12px rgba(15,23,42,0.20)',
          },
          fontFamily: {
            'headline': ['"Playfair Display"', 'serif'],
            'body': ['Inter', 'system-ui', 'sans-serif'],
          },
          fontSize: {
            /* --- Escala unificada (Fase 0) --- */
            'display': ['36px', { lineHeight: '1.15', fontWeight: '600' }],
            'h1': ['24px', { lineHeight: '1.3', fontWeight: '600' }],
            'h2': ['18px', { lineHeight: '1.4', fontWeight: '600' }],
            'body': ['14px', { lineHeight: '1.5', fontWeight: '400' }],
            'body-strong': ['14px', { lineHeight: '1.5', fontWeight: '600' }],
            'caption': ['12px', { lineHeight: '1.4', fontWeight: '500' }],
            'overline': ['11px', { lineHeight: '1', letterSpacing: '0.08em', fontWeight: '600' }],
            /* --- Legacy (en migración) --- */
            'display-lg': ['44px', { lineHeight: '1.1', letterSpacing: '-0.02em', fontWeight: '700' }],
            'headline-lg': ['32px', { lineHeight: '1.2', fontWeight: '600' }],
            'headline-md': ['24px', { lineHeight: '1.3', fontWeight: '600' }],
            'body-lg': ['18px', { lineHeight: '1.6', fontWeight: '400' }],
            'body-md': ['16px', { lineHeight: '1.5', fontWeight: '400' }],
            'label-sm': ['12px', { lineHeight: '1', letterSpacing: '0.05em', fontWeight: '600' }],
          },
        },
      },
    };
  </script>
  <style>
    html, body, #root { height: 100%; }
    body { background: #f7f9fb; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; line-height: 1; }
    .ms-fill { font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    /* Ticket térmico (80mm): oculto fuera de pantalla; al imprimir, solo él es visible. */
    #balam-ticket { position: fixed; left: -99999px; top: 0; width: 80mm; background: #fff; color: #131B2E; }
    @media print {
      body * { visibility: hidden !important; }
      #balam-ticket, #balam-ticket * { visibility: visible !important; }
      #balam-ticket { left: 0 !important; top: 0 !important; }
      @page { size: 80mm auto; margin: 0; }
    }
</style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#131b2e"/>
      <rect x="30" y="30" width="40" height="40" rx="9" fill="#fed65b"/>
      <text x="50" y="58" font-family="serif" font-size="22" font-weight="700" fill="#131b2e" text-anchor="middle">B</text>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Orden: utilidades primero, módulos después, app al final -->
  <script type="text/babel" src="balam/icons.jsx"></script>
  <script type="text/babel" src="balam/config.jsx"></script>
  <script type="text/babel" src="balam/data.jsx"></script>
  <script type="text/babel" src="balam/auth.jsx"></script>
  <script type="text/babel" src="balam/shared.jsx"></script>
  <script type="text/babel" src="balam/heritage.jsx"></script>
  <script type="text/babel" src="balam/discounts.jsx"></script>
  <script type="text/babel" src="balam/xlsx-io.jsx"></script>
  <script type="text/babel" src="balam/tweaks-panel.jsx"></script>
  <script type="text/babel" src="balam/dashboard.jsx"></script>
  <script type="text/babel" src="balam/pos.jsx"></script>
  <script type="text/babel" src="balam/pos-ticket.jsx"></script>
  <script type="text/babel" src="balam/inventory.jsx"></script>
  <script type="text/babel" src="balam/clients.jsx"></script>
  <script type="text/babel" src="balam/returns.jsx"></script>
  <script type="text/babel" src="balam/sellers.jsx"></script>
  <script type="text/babel" src="balam/reports.jsx"></script>
  <script type="text/babel" src="balam/settings.jsx"></script>
  <script type="text/babel" src="balam/store.jsx"></script>
  <script type="text/babel" src="balam/app.jsx"></script>
  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.App));
  </script>
</body>
</html>
